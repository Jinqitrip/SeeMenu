<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SeeMenu · 智拍菜单 · 故事板</title>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#FFFFFF"/>
  <rect x="20" y="20" width="60" height="60" rx="14" fill="#F7F7F8"/>
  <circle cx="50" cy="50" r="14" fill="#FF6B35"/>
  <text x="50" y="91" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" font-weight="700" fill="#000">SeeMenu</text>
</svg>
</template>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9;
    font-family: "PingFang SC", -apple-system, system-ui, sans-serif; }
  #root { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="wechat-frame.jsx"></script>
<script type="text/babel" src="style-c-1.jsx"></script>
<script type="text/babel" src="style-c-2.jsx"></script>
<script type="text/babel" src="style-c-3.jsx"></script>
<script type="text/babel" src="style-c-4.jsx"></script>
<script type="text/babel" src="style-c-5.jsx"></script>
<script type="text/babel" src="style-a-1.jsx"></script>
<script type="text/babel" src="style-a-2.jsx"></script>
<script type="text/babel" src="style-a-3.jsx"></script>

<script type="text/babel">
function App() {
  const PHONE_W = 320, PHONE_H = 692;

  const screensC_main = [
    { id: 'c1', label: '01 · 启动入口',          comp: <C_Home /> },
    { id: 'c2', label: '02 · 拍照取景',          comp: <C_Capture /> },
    { id: 'c2b', label: '02b · 拍完确认',        comp: <C_PhotoReview /> },
    { id: 'c3', label: '03 · AI 识别中',         comp: <C_Recognizing /> },
    { id: 'c3b', label: '03b · 识别失败',        comp: <C_RecognizeFail /> },
    { id: 'c4', label: '04 · 浏览菜单',          comp: <C_Menu /> },
    { id: 'c5', label: '05 · 菜品详情 / 忌口',   comp: <C_Detail /> },
    { id: 'c6', label: '06 · 我的选菜',          comp: <C_Cart /> },
  ];

  const screensC_room = [
    { id: 'c7',  label: '07 · 多人房间',         comp: <C_Room /> },
    { id: 'c7b', label: '07b · 房间二维码',      comp: <C_RoomQR /> },
    { id: 'c7c', label: '07c · 加入房间',        comp: <C_JoinRoom /> },
    { id: 'c8',  label: '08 · 出示给服务员',     comp: <C_Order /> },
    { id: 'c8b', label: '08b · 出示模式（放大）', comp: <C_OrderShow /> },
  ];

  const screensC_account = [
    { id: 'c9',  label: '09 · 个人中心',         comp: <C_Profile /> },
    { id: 'c10', label: '10 · 历史菜单',         comp: <C_History /> },
    { id: 'c11', label: '11 · 设置',            comp: <C_Settings /> },
  ];

  const screensA = [
    { id: 'a1', label: '01 · 启动入口',         comp: <A_Home /> },
    { id: 'a2', label: '02 · 拍照取景',         comp: <A_Capture /> },
    { id: 'a3', label: '03 · AI 识别中',        comp: <A_Recognizing /> },
    { id: 'a4', label: '04 · 浏览菜单',         comp: <A_Menu /> },
    { id: 'a5', label: '05 · 菜品详情 / 忌口',  comp: <A_Detail /> },
    { id: 'a6', label: '06 · 我的选菜',         comp: <A_Cart /> },
    { id: 'a7', label: '07 · 多人房间',         comp: <A_Room /> },
    { id: 'a8', label: '08 · 出示给服务员',     comp: <A_Order /> },
  ];

  const renderArtboards = (arr) => arr.map(s => (
    <DCArtboard key={s.id} id={s.id} label={s.label} width={PHONE_W} height={PHONE_H}>
      {s.comp}
    </DCArtboard>
  ));

  return (
    <DesignCanvas>
      <DCSection
        id="cover"
        title="SeeMenu · 智拍菜单"
        subtitle="出境点餐 AI 助手 · 微信小程序故事板 · 拍照 → 看懂菜单 → 多人选菜 → 生成订单"
      >
      </DCSection>

      <DCSection
        id="style-c-main"
        title="风格 C · 主流程（纯白克制系 · 主推）"
        subtitle="启动 → 拍照 → 拍完确认 → 识别中 / 失败 → 浏览菜单 → 详情 → 选菜车。纯白底 · 单色橙作为唯一强调色。"
      >
        {renderArtboards(screensC_main)}
      </DCSection>

      <DCSection
        id="style-c-room"
        title="风格 C · 多人 & 出示订单"
        subtitle="多人房间、房间二维码邀请、加入房间，最终生成订单 + 出示模式（放大给店员看）。"
      >
        {renderArtboards(screensC_room)}
      </DCSection>

      <DCSection
        id="style-c-account"
        title="风格 C · 账户体系"
        subtitle="个人中心、历史菜单、设置（语言 / 忌口 / 通用偏好）— 旅行多日的常用入口。"
      >
        {renderArtboards(screensC_account)}
      </DCSection>

      <DCSection
        id="style-a"
        title="风格 A · 暖橙温暖系（备选）"
        subtitle="暖橙 + 奶油底，强调食欲与亲和力，CTA 厚重 — 留作另一方向参考。"
      >
        {renderArtboards(screensA)}
      </DCSection>

      <DCSection
        id="notes"
        title="设计说明"
        subtitle="重点节点：识别动效（屏 03）实时框出文字 + 扫描光带 + 进度；订单页（屏 08）纸质收据视觉，日中对照，直接出示给店员。"
      >
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
